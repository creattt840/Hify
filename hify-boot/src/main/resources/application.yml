server:
  port: 8080

spring:
  application:
    name: hify
  profiles:
    active: dev
  datasource:
    jdbc-url: jdbc:mysql://localhost:3306/hify?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

# 文件上传限制
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

hify:
  knowledge:
    upload-dir: ./upload
  pg:
    jdbc-url: jdbc:postgresql://localhost:5432/hify_knowledge
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
